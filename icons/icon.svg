<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f0f1a"/>
  <!-- Controller body -->
  <rect x="80" y="180" width="352" height="200" rx="80" fill="#1a1a2e"/>
  <rect x="80" y="180" width="352" height="200" rx="80" fill="none" stroke="#00b4d8" stroke-width="6"/>
  <!-- Left joystick -->
  <circle cx="170" cy="300" r="36" fill="#0a0a18" stroke="#00b4d8" stroke-width="4"/>
  <circle cx="170" cy="300" r="18" fill="#00b4d8"/>
  <!-- Right joystick -->
  <circle cx="300" cy="300" r="36" fill="#0a0a18" stroke="#00b4d8" stroke-width="4"/>
  <circle cx="300" cy="300" r="18" fill="#00b4d8"/>
  <!-- D-pad (cross) -->
  <rect x="145" y="218" width="50" height="18" rx="6" fill="#00b4d8"/>
  <rect x="156" y="207" width="18" height="40" rx="6" fill="#00b4d8"/>
  <!-- Buttons ABXY -->
  <circle cx="370" cy="222" r="14" fill="#f44336"/>
  <circle cx="396" cy="248" r="14" fill="#4caf50"/>
  <circle cx="344" cy="248" r="14" fill="#2196f3"/>
  <circle cx="370" cy="274" r="14" fill="#ff9800"/>
  <!-- Cable nub top -->
  <rect x="226" y="148" width="60" height="34" rx="10" fill="#1a1a2e" stroke="#00b4d8" stroke-width="4"/>
  <!-- Glow effect -->
  <rect x="80" y="180" width="352" height="200" rx="80" fill="none" stroke="#00b4d8" stroke-width="2" opacity="0.3"/>
</svg>
